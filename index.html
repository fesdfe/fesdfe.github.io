<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<h1 onclick='location.href=("https://fesdfe.github.io/")' style="color:yellow;">fesdfe.github.io</h1>
<link rel="stylesheet" type="text/css" href="custom.css">
</head>

<body>
<strong>fesdfe's html<br /></strong><br />
  页面显示宽度：<span id="displayClientWidth"></span><br />
  页面显示高度：<span id="displayClientHeight"></span><br />
  页面总宽度：<span id="displayScrollWidth"></span><br />
  页面总高度：<span id="displayScrollHeight"></span><br />
  
  <button type="button" onclick="alert('Hello World!')">
    test1
  </button><br />
  <input type="button" onclick='location.href=("https://www.baidu.com/")' value="test2-打开百度"/><br>
  <input type="button" onclick="window.location.href='../test.txt/'" value="test3-在当前地址后追加&#34;/test.txt/&#34;"/><br>
  <input type="button" onclick='window.open("https://www.baidu.com/")' value="test4-新窗口打开百度"/><br>
  <div class="percentBar" id="bar01"></div><br />
  <button type="button" onclick="switchColor('bar01')" id="button01">
    更改进度条颜色
  </button><br>
  <div class="percentBar movable" style="background:green" id="bar02"></div><br />
  <button type="button" onclick="movePosition('bar02', 0, 0 ,-5)" id="button02">更改坐标</button>
  <button type="button" onclick="changeLength('bar02', 1, 20)" id="button03">更改长度</button><br />
  <iframe name="show" id="show" width="500" height="500" src="test.txt"/>
  
  <script>
    function switchColor(target00){
    if(document.getElementById(target00).style.background=="orange")
      document.getElementById(target00).style.background="gray";
    else
      document.getElementById(target00).style.background="orange";
    }
    
    function movePosition(target00, mode00, temp_X, temp_Y){
    if(mode00==0){
      temp_X = document.getElementById(target00).getBoundingClientRect().left + temp_X;
      temp_Y = document.getElementById(target00).getBoundingClientRect().top + temp_Y;
    }
    document.getElementById(target00).style.left = temp_X + 'px';
    document.getElementById(target00).style.top = temp_Y + 'px';
    }
    
    function changeLength(target00, mode00, length00){
      var tm=document.getElementById(target00);
      if(mode00==0){
        tm.style.length = tm.style.length + length00;
      }
      else{
        document.getElementById(target00).style.length = length00 + "px";
      }
    }

    function getClientWidth(){ return document.body.clientWidth; }
    function getClientHeight(){ return document.body.clientHeight; }
    function getScrollWidth(){ return document.body.scrollWidth; }
    function getScrollHeight(){ return document.body.scrollHeight; }

    document.getElementById('displayClientWidth').innerHTML = getClientWidth();
    document.getElementById('displayClientHeight').innerHTML = getClientHeight();
    document.getElementById('displayScrollWidth').innerHTML = getScrollWidth();
    document.getElementById('displayScrollHeight').innerHTML = getScrollHeight();
  </script>
  1
  </body>
  </html>
