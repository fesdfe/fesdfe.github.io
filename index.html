  <button type="button" onclick="switchColor('bar01')" id="button01">
    更改进度条颜色
  </button><br>
  <div class="percentBar movable" id="bar02"></div><br>
  <button type="button" onclick="movePosition('bar02', 0, 10 ,5)" id="button02">更改坐标</button>
  <script>
    function switchColor(target00){
    if(document.getElementById(target00).style.background=="orange")
      document.getElementById(target00).style.background="gray";
    else
      document.getElementById(target00).style.background="orange";
    }
    
    function movePosition(target00, mode00, X00, Y00){
    if(mode00==0){
      document.getElementById(target00).style.left=document.getElementById(target00).style.left + X00 + "px";
      document.getElementById(target00).style.top=document.getElementById(target00).style.top + Y00 + "px";
    }
    else{
      document.getElementById(target00).style.left=X00 + "px";
      document.getElementById(target00).style.top=Y00 + "px";
    }
    }
  </script>
